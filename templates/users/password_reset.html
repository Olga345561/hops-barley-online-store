{% extends "base.html" %}
{% load static %}
{% block title %}Reset Password — Hop & Barley{% endblock %}
{% block content %}
<main class="auth-page-wrapper">
  <div class="auth-background">
    <img src="{% static 'img/background/pattern.jpg' %}" alt="Background pattern">
  </div>
  <div class="auth-form-container">
    <div class="auth-container auth-container--forgot-password">
      <div class="Legend">
        <h1 class="auth-title">Forgot Password</h1>
      </div>

      <form class="auth-form" id="forgot-password-form" method="post">
        {% csrf_token %}
        <div class="InputField">
          <label for="{{ form.email.id_for_label }}">Email</label>
          <input type="email" name="email" id="{{ form.email.id_for_label }}"
                 class="Input" placeholder="Value" required>
          {% if form.email.errors %}<div class="form-errors">{{ form.email.errors }}</div>{% endif %}
        </div>

        <div class="ButtonGroup ButtonGroup--center">
          <a href="{% url 'users:login' %}" class="button button--cancel">Cancel</a>
          <button type="submit" class="button button--primary">Reset Password</button>
        </div>
      </form>
    </div>
  </div>
</main>
{% endblock %}
