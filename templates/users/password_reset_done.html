{% extends "base.html" %}
{% load static %}
{% block title %}Check your inbox — Hop & Barley{% endblock %}
{% block content %}
<main class="auth-page-wrapper">
  <div class="auth-background">
    <img src="{% static 'img/background/pattern.jpg' %}" alt="Background pattern">
  </div>
  <div class="auth-form-container">
    <div class="auth-container">
      <div class="Legend">
        <h1 class="auth-title">Check your inbox</h1>
      </div>
      <p>If an account with that email exists, we have sent a password reset link.</p>
      <div class="ButtonGroup ButtonGroup--center">
        <a href="{% url 'users:login' %}" class="button button--primary">Back to Sign In</a>
      </div>
    </div>
  </div>
</main>
{% endblock %}
